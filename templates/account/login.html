{% extends "predictor/base.html" %}

{% block content %}

<!-- Basic login page (override default allauth template) -->
<div class="container mt-4">
    <h1>Sign In</h1>

    <!-- Login form -->
    <form method="post" action="{% url 'account_login' %}">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Sign In</button>
    </form>
</div>

{% endblock %}
