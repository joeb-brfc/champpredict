{% extends "predictor/base.html" %}

{% block content %}

<div class="container mt-4">

  <h1>Leaderboard</h1>

  <!-- Table displaying ranked users -->
  <table>
    <thead>
      <tr>
        <th>Position</th>
        <th>User</th>
        <th>Total Points</th>
      </tr>
    </thead>

    <tbody>
      {% for entry in leaderboard_data %}
      <tr>

        <!-- Automatically generates ranking position -->
        <td>{{ forloop.counter }}</td>

        <!-- Display username -->
        <td>{{ entry.user.username }}</td>

        <!-- Display total points earned -->
        <td>{{ entry.total_points }}</td>

      </tr>

      {% empty %}
      <!-- Fallback if no users or predictions exist -->
      <tr>
        <td colspan="3">No leaderboard data available.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

{% endblock %}
